<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March iOS App Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .phone-container {
            width: 320px;
            height: 640px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin: 20px auto;
            position: relative;
            border: 2px solid #333;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }

        /* Status Bar */
        .status-bar {
            height: 44px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 24px;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
        }

        .app-content {
            height: calc(100% - 44px);
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        .tab-content {
            height: 100%;
            display: none;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        .header {
            padding: 0 24px 4px;
            background: #000;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin: 0;
        }

        h1 .count {
            color: #666;
            font-weight: 400;
            font-size: 18px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            padding: 8px;
        }

        /* Content Filters */
        .content-filters {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding-bottom: 8px;
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: #666;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 6px 0;
            position: relative;
            transition: color 0.2s;
        }

        .filter-btn:hover {
            color: #999;
        }

        .filter-btn.active {
            color: #fff;
        }

        .filter-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: #fff;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            margin: 0;
            gap: 8px;
            width: 100%;
        }

        .search-bar input {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            flex: 1;
            font-size: 13px;
            outline: none;
            text-align: left;
            padding-left: 0;
        }

        .search-bar input::placeholder {
            color: rgba(255,255,255,0.4);
            font-weight: 400;
            font-size: 13px;
        }

        .search-icon {
            color: #666;
            font-size: 14px;
        }

        /* iOS-style icons */
        .ios-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .icon-tray {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path d="M2 6h20v2H2zm0 5h20v7a1 1 0 01-1 1H3a1 1 0 01-1-1zm8 4h4v2h-4z"/></svg>');
        }

        .icon-person {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
        }

        .icon-search {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>');
        }

        .icon-refresh {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>');
        }

        .section-header {
            padding: 20px 24px 12px;
            color: #fff;
            font-size: 24px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-count {
            color: rgba(255,255,255,0.5);
            font-size: 20px;
            font-weight: 300;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .bottom-action-bar {
            height: 60px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-shrink: 0;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .object-item {
            display: flex;
            align-items: flex-start;
            padding: 16px 24px;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .object-item:hover {
            background: rgba(255,255,255,0.02);
        }

        .completion-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: transparent;
            cursor: pointer;
            margin-top: 2px;
            position: relative;
            transition: all 0.2s;
        }

        .completion-btn.completed {
            background: #fff;
            border-color: #fff;
        }

        .completion-btn.completed::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #000;
            font-size: 12px;
            font-weight: bold;
        }

        .object-content {
            flex: 1;
        }

        .object-title {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 6px;
        }

        .object-title.completed {
            color: #666;
            text-decoration: line-through;
        }

        .object-description {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .object-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .object-type {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 8px;
        }

        .object-time {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-left: auto;
        }

        .custom-tab-bar {
            display: none;
        }

        .floating-add-btn, .floating-ask-btn {
            width: 44px;
            height: 44px;
            background: transparent;
            color: #666;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
            vertical-align: middle;
        }

        .floating-add-btn {
            font-size: 24px;
            font-weight: 300;
        }

        .floating-add-btn:hover, .floating-ask-btn:hover {
            color: #999;
            transform: scale(1.05);
        }

        .voice-lines {
            display: flex;
            align-items: end;
            justify-content: center;
            gap: 2px;
            height: 14px;
            margin: auto;
        }

        .line {
            width: 2px;
            background-color: currentColor;
            border-radius: 1px;
            align-self: end;
        }

        .line1 {
            height: 8px;
        }

        .line2 {
            height: 14px;
        }

        .line3 {
            height: 10px;
        }

        .header {
            padding: 4px 24px 4px;
            background: #000;
            flex-shrink: 0;
        }

        .search-container {
            padding: 8px 24px 4px;
            background: #000;
            flex-shrink: 0;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: calc(100% - 60px);
            background: #000;
            padding: 0 40px;
            position: relative;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-form {
            width: 100%;
            max-width: 280px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .auth-button {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 8px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .auth-button:hover {
            opacity: 0.7;
        }

        .auth-button:active {
            transform: scale(0.98);
        }

        .auth-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Header */
        .header {
        }

        /* Form Styles */
        .form-section {
            padding: 20px 24px;
            flex: 1;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            color: #666;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            padding: 12px 0;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-bottom-color: rgba(255,255,255,0.3);
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .form-textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            padding: 12px 0;
            outline: none;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-textarea:focus {
            border-bottom-color: rgba(255,255,255,0.3);
        }

        .form-textarea::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .type-selector {
            display: flex;
            gap: 8px;
        }

        .type-button {
            flex: 1;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #666;
            padding: 12px 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .type-button:hover {
            border-color: rgba(255,255,255,0.2);
        }

        .type-button.selected {
            border-color: rgba(255,255,255,0.3);
            color: #fff;
        }

        .type-icon {
            font-size: 16px;
        }

        .type-name {
            font-size: 12px;
            font-weight: 500;
        }

        .create-button {
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .create-btn {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .create-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.9);
        }

        .create-btn:disabled {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
        }

        /* Chat Screen Styles */
        .chat-screen {
            height: calc(100% - 60px);
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 8px 24px;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            background: #000;
            flex-shrink: 0;
            gap: 12px;
        }

        .chat-header h2 {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .back-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .back-btn:hover {
            color: #999;
            transform: scale(1.05);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .ai-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .ai-message .message-content {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .user-message .message-content {
            background: #007AFF;
            color: #fff;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
            padding: 0 16px;
        }

        .chat-input-container {
            padding: 16px 24px 20px;
            background: #000;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .chat-input-bar {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 12px 16px;
            gap: 8px;
            min-height: 20px;
        }

        .chat-input-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            outline: none;
            padding: 4px 0;
        }

        .chat-input-bar input::placeholder {
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }

        .send-btn {
            background: #007AFF;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #0056CC;
        }

        .send-btn:disabled {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="search-bar">
                <span class="ios-icon icon-search search-icon"></span>
                <input type="text" placeholder="Find bookmarks, notes etc" id="searchInput">
            </div>
        </div>

        <!-- Login Screen -->
        <div class="login-screen" id="loginScreen">
            <div class="login-form">
                <button class="auth-button" onclick="loginWithGoogle()">
                    <svg class="auth-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
                
                <button class="auth-button" onclick="loginWithGitHub()">
                    <svg class="auth-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    Continue with GitHub
                </button>
            </div>
        </div>

        <!-- Main App -->
        <div class="app-content" id="appContent" style="display: none;">

            <!-- Chat Screen -->
            <div class="chat-screen" id="chatScreen" style="display: none;">
                <div class="chat-header">
                    <button class="back-btn" onclick="closeChatScreen()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.42-1.41L7.83 13H20v-2z"/>
                        </svg>
                    </button>
                    <h2>AI Assistant</h2>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="message ai-message">
                        <div class="message-content">
                            Hi! I'm your AI assistant. I can help you with tasks, calendar events, emails, and more. What can I do for you today?
                        </div>
                        <div class="message-time">just now</div>
                    </div>
                </div>
                
                <!-- Chat Input -->
                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <input type="text" id="chatInput" class="chat-input" placeholder="Message">
                        <button id="sendButton" class="send-button" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Inbox Tab -->
            <div class="tab-content active" id="inboxTab">
                <div class="header">
                    <div class="header-actions">
                        <h1 id="inboxTitle">Today <span class="count">${objects.length}</span></h1>
                        <button class="refresh-btn" onclick="refreshInbox()">
                            <span class="ios-icon icon-refresh"></span>
                        </button>
                    </div>
                    
                    <!-- Content Filters -->
                    <div class="content-filters">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="archived">Archived</button>
                        <button class="filter-btn" data-filter="recommended">Recommended</button>
                    </div>
                </div>

                <div class="content-area" id="objectsList">
                    <!-- Objects will be rendered here -->
                </div>
            </div>

            <!-- Quick Add Tab -->
            <div class="tab-content" id="addTab">
                <div class="header">
                    <div class="header-actions">
                        <h1>Add</h1>
                        <button class="refresh-btn" onclick="clearForm()" style="display: none;" id="clearBtn">Clear</button>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-group">
                        <label class="form-label">What needs to be done?</label>
                        <input type="text" class="form-input" id="titleInput" placeholder="">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Add details</label>
                        <textarea class="form-textarea" id="descriptionInput" placeholder=""></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Type</label>
                        <div class="type-selector">
                            <button class="type-button selected" data-type="todo">
                                <span class="type-icon">✓</span>
                                <span class="type-name">Todo</span>
                            </button>
                            <button class="type-button" data-type="note">
                                <span class="type-icon">📝</span>
                                <span class="type-name">Note</span>
                            </button>
                            <button class="type-button" data-type="bookmark">
                                <span class="type-icon">🔖</span>
                                <span class="type-name">Bookmark</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="create-button">
                    <button class="create-btn" id="createBtn" disabled>Add to inbox</button>
                </div>
            </div>

            <!-- Profile Tab -->
            <div class="tab-content" id="profileTab">
                <div class="empty-state">
                    <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1)); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 500; margin-bottom: 20px;">DU</div>
                    <div class="empty-title">Demo User</div>
                    <div class="empty-subtitle">demo@march.com</div>
                    <button style="margin-top: 40px; padding: 12px 24px; background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #666; cursor: pointer;" onclick="logout()">Sign out</button>
                </div>
            </div>
        </div>

        <!-- Bottom Action Bar -->
        <div class="bottom-action-bar">
            <button class="floating-add-btn" onclick="switchTab('add')">+</button>
            <button class="floating-ask-btn" onclick="openAskAgent()">
                <div class="voice-lines">
                    <span class="line line1"></span>
                    <span class="line line2"></span>
                    <span class="line line3"></span>
                </div>
            </button>
        </div>
    </div>

    <script>
        // Sample data
        let objects = [
            {
                id: '1',
                title: 'Review Linear mobile design',
                description: 'Study their minimal UI patterns and interaction design for our March app',
                type: 'todo',
                isCompleted: false,
                createdAt: new Date(Date.now() - 3600000), // 1 hour ago
                tags: ['design', 'mobile']
            },
            {
                id: '2',
                title: 'Meeting notes: Product strategy Q1',
                description: 'Key takeaways from our product roadmap discussion:\n\n- Focus on mobile-first experience\n- AI integration for smart suggestions\n- Cross-platform sync improvements',
                type: 'note',
                isCompleted: false,
                createdAt: new Date(Date.now() - 7200000), // 2 hours ago
                tags: ['meeting', 'strategy']
            },
            {
                id: '3',
                title: 'Neuecast - Minimal podcast app inspiration',
                description: 'https://neuecast.app/ - Beautiful example of minimalist design principles',
                type: 'bookmark',
                isCompleted: false,
                createdAt: new Date(Date.now() - 86400000), // 1 day ago
                tags: ['design', 'inspiration']
            },
            {
                id: '4',
                title: 'Call with design team about mobile flows',
                description: 'Discuss user journey and interaction patterns for the iOS app',
                type: 'todo',
                isCompleted: true,
                createdAt: new Date(Date.now() - 172800000), // 2 days ago
                tags: ['meeting', 'design']
            },
            {
                id: '5',
                title: 'Research on minimal UI patterns',
                description: 'Collection of references from top mobile apps like Linear, Neuecast, and others',
                type: 'note',
                isCompleted: false,
                createdAt: new Date(Date.now() - 604800000), // 1 week ago
                tags: ['research', 'design']
            }
        ];

        let selectedType = 'todo';

        // Login functionality
        function loginWithGoogle() {
            // In real app, this would use Google OAuth
            console.log('Login with Google');
            // Simulate OAuth redirect/popup
            setTimeout(() => {
                login();
            }, 500);
        }

        function loginWithGitHub() {
            // In real app, this would use GitHub OAuth
            console.log('Login with GitHub');
            // Simulate OAuth redirect/popup
            setTimeout(() => {
                login();
            }, 500);
        }

        function login() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'flex';
            renderObjects();
        }

        function switchTab(tab) {
            if (tab === 'add') {
                // Toggle between inbox and add view
                const inboxTab = document.getElementById('inboxTab');
                const addTab = document.getElementById('addTab');
                
                if (addTab.classList.contains('active')) {
                    // Currently on add, go back to inbox
                    addTab.classList.remove('active');
                    inboxTab.classList.add('active');
                } else {
                    // Currently on inbox, go to add
                    inboxTab.classList.remove('active');
                    addTab.classList.add('active');
                }
            }
        }

        function renderObjects() {
            const container = document.getElementById('objectsList');
            const inboxTitle = document.getElementById('inboxTitle');
            
            // Get filtered objects
            const filteredObjects = getFilteredObjects();
            
            // Update inbox title with count
            inboxTitle.innerHTML = `Today <span class="count">${filteredObjects.length}</span>`;
            
            let html = '';

            // Render filtered objects
            filteredObjects.forEach(obj => {
                html += renderObjectItem(obj);
            });

            if (html === '') {
                html = `
                    <div class="empty-state">
                        <div class="empty-icon">📥</div>
                        <div class="empty-title">All clear</div>
                        <div class="empty-subtitle">Nothing for today right now</div>
                    </div>
                `;
                inboxTitle.textContent = 'Today';
            }

            container.innerHTML = html;
        }

        function renderObjectItem(obj) {
            return `
                <div class="object-item" data-id="${obj.id}">
                    <button class="completion-btn ${obj.isCompleted ? 'completed' : ''}" onclick="toggleComplete('${obj.id}')"></button>
                    <div class="object-content">
                        <div class="object-title ${obj.isCompleted ? 'completed' : ''}">${obj.title}</div>
                        ${obj.description ? `<div class="object-description">${obj.description}</div>` : ''}
                        <div class="object-meta">
                            <span class="object-type">${obj.type}</span>
                            <span class="object-time">${formatTime(obj.createdAt)}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleComplete(id) {
            const object = objects.find(obj => obj.id === id);
            if (object) {
                object.isCompleted = !object.isCompleted;
                renderObjects();
            }
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            if (hours < 1) return 'now';
            if (hours < 24) return `${hours}h`;
            const days = Math.floor(hours / 24);
            return `${days}d`;
        }

        function refreshInbox() {
            renderObjects();
        }

        function logout() {
            document.getElementById('appContent').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('emailInput').value = 'demo@march.com';
            document.getElementById('passwordInput').value = '';
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const objectItems = document.querySelectorAll('.object-item');
            
            objectItems.forEach(item => {
                const title = item.querySelector('.object-title').textContent.toLowerCase();
                const description = item.querySelector('.object-description')?.textContent.toLowerCase() || '';
                const matches = title.includes(query) || description.includes(query);
                item.style.display = matches ? 'flex' : 'none';
            });
        });

        // Form functionality
        function setupFormListeners() {
            const titleInput = document.getElementById('titleInput');
            const descriptionInput = document.getElementById('descriptionInput');
            const createBtn = document.getElementById('createBtn');
            const typeButtons = document.querySelectorAll('.type-button');

            // Enable/disable create button based on title input
            function updateCreateBtn() {
                const hasTitle = titleInput.value.trim().length > 0;
                createBtn.disabled = !hasTitle;
            }

            titleInput.addEventListener('input', updateCreateBtn);

            // Type selection
            typeButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    typeButtons.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedType = btn.dataset.type;
                });
            });

            // Create new object
            createBtn.addEventListener('click', () => {
                const title = titleInput.value.trim();
                const description = descriptionInput.value.trim();
                
                if (title) {
                    const newObject = {
                        id: Date.now().toString(),
                        title: title,
                        description: description,
                        type: selectedType,
                        isCompleted: false,
                        createdAt: new Date(),
                        tags: []
                    };
                    
                    objects.unshift(newObject); // Add to beginning
                    clearForm();
                    switchTab('inbox'); // Go back to inbox
                    renderObjects();
                }
            });
        }

        function clearForm() {
            document.getElementById('titleInput').value = '';
            document.getElementById('descriptionInput').value = '';
            document.getElementById('createBtn').disabled = true;
            
            // Reset type selection to todo
            document.querySelectorAll('.type-button').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.dataset.type === 'todo') {
                    btn.classList.add('selected');
                }
            });
            selectedType = 'todo';
        }

        // Filter functionality
        let currentFilter = 'all';

        function setupFilterListeners() {
            const filterButtons = document.querySelectorAll('.filter-btn');
            
            filterButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Update active state
                    filterButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Update current filter
                    currentFilter = btn.dataset.filter;
                    
                    // Re-render objects with filter
                    renderObjects();
                });
            });
        }

        function getFilteredObjects() {
            switch(currentFilter) {
                case 'archived':
                    // For demo, show completed items as "archived"
                    return objects.filter(obj => obj.isCompleted);
                case 'recommended':
                    // For demo, show recent items as "recommended"
                    return objects.filter(obj => {
                        const hoursSinceCreated = (new Date() - obj.createdAt) / (1000 * 60 * 60);
                        return hoursSinceCreated < 48; // Last 48 hours
                    });
                default:
                    return objects.filter(obj => !obj.isCompleted); // Show only non-completed for "All"
            }
        }

        // Chat functionality
        function openAskAgent() {
            // Hide inbox and show chat screen
            document.getElementById('inboxTab').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
        }

        function closeChatScreen() {
            // Hide chat screen and show inbox
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('inboxTab').style.display = 'flex';
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (message) {
                // Add user message
                addMessage(message, 'user');
                input.value = '';
                
                // Simulate AI response after short delay
                setTimeout(() => {
                    const responses = [
                        "I've created a new task: '" + message + "' and added it to your inbox.",
                        "Task completed! I've scheduled this for you in your calendar.",
                        "I've sent an email regarding: '" + message + "' to the relevant contacts.",
                        "I've found 3 related items in your calendar and notes. Would you like me to show them?",
                        "Great! I've updated your Linear workspace with this information.",
                        "I've created a bookmark for this and organized it in your March workspace."
                    ];
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    addMessage(randomResponse, 'ai');
                }, 1000);
            }
        }

        function addMessage(content, type) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            
            const now = new Date();
            const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            messageDiv.innerHTML = `
                <div class="message-content">${content}</div>
                <div class="message-time">${timeString}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Enter key to send message and input handling
        document.addEventListener('DOMContentLoaded', function() {
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            
            if (chatInput && sendBtn) {
                // Enter key to send
                chatInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        sendMessage();
                    }
                });
                
                // Enable/disable send button based on input
                chatInput.addEventListener('input', function() {
                    const hasText = chatInput.value.trim().length > 0;
                    sendBtn.disabled = !hasText;
                });
                
                // Initialize send button as disabled
                sendBtn.disabled = true;
            }
        });

        // Initialize
        renderObjects();
        setupFormListeners();
        setupFilterListeners();
    </script>
</body>
</html>
